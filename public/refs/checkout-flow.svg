<svg xmlns="http://www.w3.org/2000/svg" width="680" height="760" viewBox="0 0 680 760" role="img" aria-label="Classic e-commerce checkout flowchart">
<title>Classic e-commerce checkout flowchart</title>
<desc>A top-down checkout flow starting from the cart, triggered by clicking checkout, through a sign-in decision, shipping, payment and review steps, a payment-approval decision with a retry loop, ending at order confirmation.</desc>
<style>
  text{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .th{font-size:14px;font-weight:500;}
  .ts{font-size:12px;font-weight:400;}
  .arr{stroke:#73726c;stroke-width:1.5;fill:none;}
  .lbl{font-size:12px;fill:#73726c;}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="250" y="30" width="200" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="350" y="50" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Cart review</text>
<text class="ts" x="350" y="67" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Items added · before</text>
<line x1="350" y1="80" x2="350" y2="103" class="arr" marker-end="url(#arrow)"/>

<rect x="250" y="105" width="200" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="350" y="125" text-anchor="middle" dominant-baseline="central" fill="#633806">Click 'Checkout'</text>
<text class="ts" x="350" y="142" text-anchor="middle" dominant-baseline="central" fill="#854F0B">The trigger · entry point</text>
<line x1="350" y1="155" x2="350" y2="180" class="arr" marker-end="url(#arrow)"/>

<polygon points="350,182 442,220 350,258 258,220" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="350" y="220" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Logged in?</text>

<text class="lbl" x="462" y="212" text-anchor="middle">No</text>
<line x1="442" y1="220" x2="483" y2="220" class="arr" marker-end="url(#arrow)"/>
<rect x="485" y="195" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="560" y="215" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Guest checkout</text>
<text class="ts" x="560" y="232" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Skip sign-in</text>
<path class="arr" d="M560 245 V282 H352" marker-end="url(#arrow)"/>

<text class="lbl" x="338" y="278" text-anchor="end">Yes</text>
<line x1="350" y1="258" x2="350" y2="297" class="arr" marker-end="url(#arrow)"/>

<rect x="250" y="300" width="200" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="350" y="320" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Shipping details</text>
<text class="ts" x="350" y="337" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Address &amp; method</text>
<line x1="350" y1="350" x2="350" y2="373" class="arr" marker-end="url(#arrow)"/>

<rect x="250" y="375" width="200" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="350" y="395" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Payment details</text>
<text class="ts" x="350" y="412" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Card / wallet</text>
<line x1="350" y1="425" x2="350" y2="448" class="arr" marker-end="url(#arrow)"/>

<rect x="250" y="450" width="200" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="350" y="470" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Review &amp; place order</text>
<text class="ts" x="350" y="487" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Confirm summary</text>
<line x1="350" y1="500" x2="350" y2="523" class="arr" marker-end="url(#arrow)"/>

<polygon points="350,525 450,565 350,605 250,565" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="350" y="565" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Payment approved?</text>

<text class="lbl" x="236" y="557" text-anchor="middle">No</text>
<line x1="250" y1="565" x2="222" y2="565" class="arr" marker-end="url(#arrow)"/>
<rect x="70" y="540" width="150" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="145" y="560" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Payment failed</text>
<text class="ts" x="145" y="577" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Show error, retry</text>
<path class="arr" d="M145 540 V400 H248" marker-end="url(#arrow)"/>

<text class="lbl" x="338" y="625" text-anchor="end">Yes</text>
<line x1="350" y1="605" x2="350" y2="643" class="arr" marker-end="url(#arrow)"/>

<rect x="250" y="645" width="200" height="55" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="350" y="667" text-anchor="middle" dominant-baseline="central" fill="#085041">Order confirmed</text>
<text class="ts" x="350" y="685" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Receipt + email · after</text>

<rect x="40" y="725" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="ts" x="57" y="731" dominant-baseline="central" fill="#5F5E5A">Trigger</text>
<rect x="150" y="725" width="12" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="167" y="731" dominant-baseline="central" fill="#5F5E5A">Step</text>
<rect x="240" y="725" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="257" y="731" dominant-baseline="central" fill="#5F5E5A">Decision</text>
<rect x="360" y="725" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="377" y="731" dominant-baseline="central" fill="#5F5E5A">Alt path</text>
<rect x="475" y="725" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="492" y="731" dominant-baseline="central" fill="#5F5E5A">Done</text>
</svg>
